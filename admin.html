<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<title>비단결고운길 · 관리자</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;600;700&family=Noto+Sans+KR:wght@400;500;700&family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/config.js"></script>
<style>
/* ─── RESET ─── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html { font-size: 16px; -webkit-text-size-adjust: 100%; }

/* ─── TOKENS ─── */
:root {
  --bg:       #f8f5f1;
  --surface:  #ffffff;
  --surface2: #faf7f4;
  --border:   #ecddd4;
  --border2:  #e0cfc4;
  --rose:     #c4705a;
  --rose-dk:  #8e4a38;
  --rose-lt:  #fde8e0;
  --gold:     #b8996a;
  --dark:     #2a1e18;
  --mid:      #6b4c3b;
  --muted:    #a08878;
  --green:    #5c8f61;
  --green-lt: #e8f4e8;
  --red:      #c0504d;
  --red-lt:   #fce8e8;
  --yellow:   #b8860b;
  --yellow-lt:#fdf4e0;
  --blue:     #4472c4;
  --blue-lt:  #e8f0fb;
  --radius-sm: 8px;
  --radius:    12px;
  --radius-lg: 16px;
  --shadow-sm: 0 1px 4px rgba(44,31,23,.06);
  --shadow:    0 2px 16px rgba(44,31,23,.08);
  --shadow-lg: 0 8px 40px rgba(44,31,23,.14);
  --nav-h:    60px;   /* mobile bottom nav */
  --side-w:   240px;  /* tablet/desktop sidebar */
  --header-h: 56px;
}

/* ─── BASE ─── */
body {
  font-family: 'Noto Sans KR', sans-serif;
  background: var(--bg);
  color: var(--dark);
  min-height: 100vh;
  line-height: 1.6;
  overflow-x: hidden;
}

/* ─── TYPOGRAPHY ─── */
.serif { font-family: 'Noto Serif KR', serif; }
h1,h2,h3 { font-family: 'Noto Serif KR', serif; font-weight: 600; }

/* ─── LOGIN ─── */
#loginWrap {
  position: fixed; inset: 0; z-index: 9999;
  background: var(--bg);
  display: flex; align-items: center; justify-content: center;
  padding: 1.5rem;
}
.login-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: clamp(1.8rem, 5vw, 2.8rem);
  width: 100%; max-width: 380px;
  box-shadow: var(--shadow-lg);
  text-align: center;
}
.login-icon { font-size: 2.4rem; margin-bottom: 1rem; }
.login-title { font-family: 'Noto Serif KR', serif; font-size: 1.2rem; font-weight: 700; margin-bottom: 0.3rem; }
.login-sub { font-size: 0.8rem; color: var(--muted); margin-bottom: 2rem; }
.login-err { color: var(--red); font-size: 0.78rem; margin-top: 0.8rem; min-height: 1.2em; }

/* ─── APP SHELL ─── */
#app { display: none; min-height: 100vh; }
#app.ready { display: flex; }

/* ─── SIDEBAR (tablet+) ─── */
.sidebar {
  width: var(--side-w);
  background: var(--dark);
  display: flex; flex-direction: column;
  position: fixed; top: 0; left: 0; bottom: 0; z-index: 200;
  transform: translateX(-100%);
  transition: transform 0.25s ease;
  overflow-y: auto;
}
.sidebar.open { transform: translateX(0); }
.sidebar-logo {
  padding: 1.6rem 1.4rem 1.2rem;
  border-bottom: 1px solid rgba(255,255,255,0.08);
}
.sidebar-logo-ko { font-family: 'Noto Serif KR', serif; font-size: 1rem; font-weight: 700; color: #f0ddd0; letter-spacing: 0.04em; }
.sidebar-logo-en { font-family: 'Cormorant Garamond', serif; font-size: 0.7rem; font-style: italic; color: var(--gold); letter-spacing: 0.14em; margin-top: 2px; }
.sidebar-nav { flex: 1; padding: 0.8rem 0; }
.snav-item {
  display: flex; align-items: center; gap: 12px;
  padding: 0.85rem 1.4rem;
  font-size: 0.88rem; font-weight: 500;
  color: rgba(240,221,208,0.65);
  cursor: pointer; transition: all 0.15s;
  border-left: 3px solid transparent;
  user-select: none;
}
.snav-item:hover { color: #f0ddd0; background: rgba(255,255,255,0.05); }
.snav-item.on { color: var(--rose); border-left-color: var(--rose); background: rgba(196,112,90,0.1); }
.snav-icon { font-size: 1.1rem; width: 22px; text-align: center; flex-shrink: 0; }
.sidebar-footer {
  padding: 1rem 1.4rem;
  border-top: 1px solid rgba(255,255,255,0.08);
}
.logout-btn {
  width: 100%; background: rgba(255,255,255,0.07); border: 1px solid rgba(255,255,255,0.12);
  color: rgba(240,221,208,0.6); border-radius: var(--radius-sm);
  padding: 10px; font-family: 'Noto Sans KR', sans-serif; font-size: 0.82rem;
  cursor: pointer; transition: all 0.15s;
}
.logout-btn:hover { background: rgba(255,255,255,0.12); color: #f0ddd0; }

/* sidebar overlay (mobile) */
.sidebar-overlay {
  display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.45); z-index: 199;
}
.sidebar-overlay.show { display: block; }

/* ─── HEADER ─── */
.topbar {
  position: fixed; top: 0; left: 0; right: 0; z-index: 100;
  height: var(--header-h);
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; padding: 0 1rem 0 1.1rem;
  gap: 0.8rem;
  box-shadow: var(--shadow-sm);
}
.menu-btn {
  background: none; border: none; padding: 8px; border-radius: var(--radius-sm);
  cursor: pointer; color: var(--mid); font-size: 1.2rem; line-height: 1;
  flex-shrink: 0; transition: background 0.13s;
}
.menu-btn:hover { background: var(--surface2); }
.topbar-title { font-family: 'Noto Serif KR', serif; font-size: 1rem; font-weight: 700; color: var(--dark); flex: 1; }
.topbar-date { font-size: 0.72rem; color: var(--muted); white-space: nowrap; }
.admin-chip { background: var(--rose); color: #fff; font-size: 0.65rem; font-weight: 700; padding: 3px 9px; border-radius: 20px; flex-shrink: 0; }

/* ─── MAIN CONTENT ─── */
.content {
  flex: 1;
  margin-top: var(--header-h);
  padding: 1.2rem 1rem calc(var(--nav-h) + 1.2rem);
  min-width: 0;
  width: 100%;
}
.content-inner { max-width: 900px; margin: 0 auto; }

/* ─── BOTTOM NAV (mobile) ─── */
.bottom-nav {
  position: fixed; bottom: 0; left: 0; right: 0; z-index: 100;
  height: var(--nav-h);
  background: var(--surface);
  border-top: 1px solid var(--border);
  display: flex;
  padding-bottom: env(safe-area-inset-bottom);
  box-shadow: 0 -2px 12px rgba(44,31,23,0.07);
}
.bnav-item {
  flex: 1; display: flex; flex-direction: column; align-items: center;
  justify-content: center; gap: 3px; padding: 8px 4px;
  cursor: pointer; transition: all 0.15s; border: none; background: none;
  color: var(--muted); font-family: 'Noto Sans KR', sans-serif;
}
.bnav-item.on { color: var(--rose); }
.bnav-icon { font-size: 1.25rem; line-height: 1; }
.bnav-label { font-size: 0.62rem; font-weight: 500; letter-spacing: 0.02em; }

/* ─── TABLET/DESKTOP: sidebar layout ─── */
@media (min-width: 768px) {
  :root { --nav-h: 0px; }
  .bottom-nav { display: none; }
  .sidebar { transform: translateX(0); }
  .topbar { left: var(--side-w); }
  .content { margin-left: var(--side-w); padding-bottom: 2rem; }
  .menu-btn { display: none; }
}

/* ─── TAB PANELS ─── */
.tp { display: none; }
.tp.on { display: block; }

/* ─── PAGE TITLE ─── */
.page-title {
  font-size: clamp(1.1rem, 3vw, 1.4rem);
  font-weight: 700; color: var(--dark);
  margin-bottom: 1.2rem;
  display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 0.6rem;
}

/* ─── STAT CARDS ─── */
.stat-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 0.8rem;
  margin-bottom: 1.5rem;
}
@media (min-width: 600px) { .stat-grid { grid-template-columns: repeat(4, 1fr); } }
.stat-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 1rem 1.1rem;
  box-shadow: var(--shadow-sm);
  transition: transform 0.14s;
}
.stat-card:active { transform: scale(0.98); }
.stat-icon { font-size: 1.3rem; margin-bottom: 0.5rem; }
.stat-label { font-size: 0.72rem; color: var(--muted); font-weight: 400; }
.stat-val {
  font-family: 'Cormorant Garamond', serif;
  font-size: 2rem; font-weight: 600; color: var(--dark); line-height: 1.1;
  margin: 2px 0;
}
.stat-sub { font-size: 0.7rem; color: var(--green); }

/* ─── SECTION TITLE ─── */
.sec-title {
  font-size: 0.95rem; font-weight: 700; color: var(--dark);
  margin-bottom: 0.8rem;
  display: flex; align-items: center; gap: 0.5rem;
}
.sec-title::after { content:''; flex:1; height:1px; background: var(--border); }

/* ─── CARD LIST (replaces tables on mobile) ─── */
.item-list { display: flex; flex-direction: column; gap: 0.65rem; }
.item-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 1rem 1.1rem;
  box-shadow: var(--shadow-sm);
  transition: all 0.14s;
}
.item-card:hover { border-color: var(--rose); box-shadow: 0 4px 20px rgba(196,112,90,.1); }
.item-row { display: flex; align-items: flex-start; justify-content: space-between; gap: 0.8rem; }
.item-main { flex: 1; min-width: 0; }
.item-name { font-weight: 700; font-size: 0.95rem; margin-bottom: 3px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.item-meta { font-size: 0.78rem; color: var(--muted); line-height: 1.5; }
.item-actions { display: flex; gap: 6px; flex-shrink: 0; flex-wrap: wrap; justify-content: flex-end; }

/* ─── TODAY ITEM ─── */
.today-item {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 0.9rem 1.1rem;
  display: flex; align-items: center; gap: 1rem;
  box-shadow: var(--shadow-sm);
}
.today-time { text-align: center; min-width: 50px; flex-shrink: 0; }
.today-time-v { font-family: 'Cormorant Garamond', serif; font-size: 1.4rem; font-weight: 600; color: var(--rose); line-height: 1; }
.today-time-d { font-size: 0.62rem; color: var(--muted); }
.today-div { width: 1px; height: 32px; background: var(--border); flex-shrink: 0; }
.today-info { flex: 1; min-width: 0; }
.today-cls { font-weight: 700; font-size: 0.88rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.today-memo { font-size: 0.74rem; color: var(--muted); margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

/* ─── PASS PROGRESS ─── */
.progress { background: #f0e8e0; border-radius: 20px; height: 6px; overflow: hidden; margin-top: 5px; }
.progress-fill { height: 100%; border-radius: 20px; background: var(--rose); transition: width 0.5s; }

/* ─── BADGE ─── */
.badge {
  display: inline-block; padding: 3px 9px; border-radius: 20px;
  font-size: 0.68rem; font-weight: 700; letter-spacing: 0.03em; white-space: nowrap;
}
.b-green  { background: var(--green-lt);  color: #3d6e41; }
.b-red    { background: var(--red-lt);    color: #9e3a38; }
.b-yellow { background: var(--yellow-lt); color: #8a6209; }
.b-rose   { background: var(--rose-lt);   color: #8e4a38; }
.b-blue   { background: var(--blue-lt);   color: #2a56a0; }
.b-gray   { background: #f0ece8;          color: #7a6a60; }

/* ─── BUTTONS ─── */
.btn {
  display: inline-flex; align-items: center; justify-content: center; gap: 5px;
  border: none; border-radius: var(--radius-sm); padding: 9px 18px;
  font-family: 'Noto Sans KR', sans-serif; font-size: 0.82rem; font-weight: 500;
  cursor: pointer; transition: all 0.15s; letter-spacing: 0.02em;
  white-space: nowrap; text-decoration: none; -webkit-appearance: none;
  min-height: 40px;
}
.btn-p { background: var(--rose); color: #fff; }
.btn-p:active { background: var(--rose-dk); }
.btn-o { background: var(--surface); border: 1px solid var(--border2); color: var(--mid); }
.btn-o:active { background: var(--surface2); }
.btn-d { background: var(--surface); border: 1px solid #f4c0b0; color: var(--red); }
.btn-d:active { background: var(--red-lt); }
.btn-s { background: var(--green-lt); border: 1px solid #b8d8bc; color: #3d6e41; }
.btn-sm { padding: 6px 12px; font-size: 0.76rem; min-height: 34px; }
.btn-full { width: 100%; }

/* ─── TOOLBAR ─── */
.toolbar { display: flex; gap: 0.6rem; margin-bottom: 1rem; flex-wrap: wrap; align-items: center; }
.fi {
  border: 1px solid var(--border); border-radius: var(--radius-sm);
  padding: 9px 12px; font-family: 'Noto Sans KR', sans-serif;
  font-size: 0.83rem; color: var(--dark); background: var(--surface);
  outline: none; transition: border-color 0.14s; min-height: 40px;
  flex: 1; min-width: 0;
}
.fi:focus { border-color: var(--rose); }
.fi-fixed { flex: none; }

/* ─── FORM ─── */
.fg { margin-bottom: 1rem; }
.fl { display: block; font-size: 0.74rem; font-weight: 700; color: var(--mid); margin-bottom: 5px; letter-spacing: 0.03em; }
.finp, .fsel, .fta {
  width: 100%; border: 1.5px solid var(--border); border-radius: var(--radius-sm);
  padding: 11px 13px; font-family: 'Noto Sans KR', sans-serif; font-size: 0.88rem;
  color: var(--dark); background: var(--surface2); outline: none;
  transition: all 0.16s; min-height: 44px;
}
.finp:focus, .fsel:focus, .fta:focus {
  border-color: var(--rose); background: var(--surface);
  box-shadow: 0 0 0 3px rgba(196,112,90,0.12);
}
.fta { resize: vertical; min-height: 88px; }
.frow { display: grid; grid-template-columns: 1fr 1fr; gap: 0.8rem; }
@media (max-width: 400px) { .frow { grid-template-columns: 1fr; } }

/* ─── MODAL ─── */
.overlay {
  display: none; position: fixed; inset: 0; z-index: 500;
  background: rgba(42,30,24,0.55);
  align-items: flex-end; justify-content: center;
  padding: 0;
}
.overlay.open { display: flex; }
@media (min-width: 520px) {
  .overlay { align-items: center; padding: 1rem; }
}
.modal {
  background: var(--surface); width: 100%;
  max-height: 92vh; overflow-y: auto;
  border-radius: var(--radius-lg) var(--radius-lg) 0 0;
  padding: 1.4rem 1.2rem calc(1.4rem + env(safe-area-inset-bottom));
  box-shadow: var(--shadow-lg);
  animation: slideUp 0.22s ease;
}
@media (min-width: 520px) {
  .modal { max-width: 480px; border-radius: var(--radius-lg); animation: fadeUp 0.22s ease; }
}
@keyframes slideUp { from { transform: translateY(40px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
@keyframes fadeUp  { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
.modal-handle { width: 36px; height: 4px; background: var(--border); border-radius: 2px; margin: 0 auto 1.2rem; }
@media (min-width: 520px) { .modal-handle { display: none; } }
.modal-hd { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.2rem; }
.modal-title { font-family: 'Noto Serif KR', serif; font-size: 1.05rem; font-weight: 700; }
.modal-close { background: var(--surface2); border: none; width: 32px; height: 32px; border-radius: 50%; cursor: pointer; font-size: 1rem; color: var(--muted); display: flex; align-items: center; justify-content: center; }
.modal-close:active { background: var(--border); }
.modal-ft { display: flex; gap: 0.6rem; margin-top: 1.4rem; }
.modal-ft .btn { flex: 1; }

/* ─── EMPTY ─── */
.empty { text-align: center; padding: 3rem 1rem; color: var(--muted); }
.empty-icon { font-size: 2.5rem; margin-bottom: 0.7rem; }
.empty p { font-size: 0.84rem; }

/* ─── LOADING ─── */
.loading { display: flex; align-items: center; justify-content: center; padding: 2.5rem; gap: 0.5rem; color: var(--muted); font-size: 0.84rem; }
.spinner { width: 18px; height: 18px; border: 2px solid var(--border); border-top-color: var(--rose); border-radius: 50%; animation: spin 0.7s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

/* ─── TOAST ─── */
#toast {
  position: fixed; bottom: calc(var(--nav-h) + 1rem); left: 50%;
  transform: translateX(-50%) translateY(10px);
  background: var(--dark); color: #fff;
  padding: 11px 22px; border-radius: 30px;
  font-size: 0.84rem; font-weight: 500;
  opacity: 0; transition: all 0.25s; z-index: 9000;
  white-space: nowrap; pointer-events: none; max-width: 90vw;
  text-align: center; overflow: hidden; text-overflow: ellipsis;
}
#toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* ─── NOTICE ─── */
.notice-card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 1rem 1.1rem; box-shadow: var(--shadow-sm);
  margin-bottom: 0.65rem;
}
.notice-hd { display: flex; justify-content: space-between; align-items: flex-start; gap: 0.5rem; margin-bottom: 0.4rem; }
.notice-title { font-weight: 700; font-size: 0.9rem; flex: 1; }
.notice-date { font-size: 0.7rem; color: var(--muted); flex-shrink: 0; }
.notice-body { font-size: 0.8rem; color: var(--mid); line-height: 1.65; }

/* ─── INQUIRY HIGHLIGHT ─── */
.item-card.inquiry { border-left: 3px solid var(--gold); }

/* ─── CODE ─── */
code { font-family: monospace; background: var(--surface2); padding: 1px 5px; border-radius: 4px; font-size: 0.82em; }
</style>
</head>
<body>

<div id="toast"></div>

<!-- ── LOGIN ── -->
<div id="loginWrap">
  <div class="login-card">
    <div class="login-icon">🌸</div>
    <div class="login-title">비단결고운길 필라테스</div>
    <div class="login-sub">관리자 로그인</div>
    <div class="fg"><label class="fl">이메일</label><input class="finp" id="lEmail" type="email" placeholder="admin@pilates.com" autocomplete="username"></div>
    <div class="fg"><label class="fl">비밀번호</label><input class="finp" id="lPw" type="password" placeholder="••••••••" autocomplete="current-password"></div>
    <button class="btn btn-p btn-full" style="font-size:0.92rem;padding:13px" onclick="doLogin()">로그인</button>
    <div class="login-err" id="loginErr"></div>
  </div>
</div>

<!-- ── APP SHELL ── -->
<div id="app">

  <!-- Sidebar overlay -->
  <div class="sidebar-overlay" id="sideOverlay" onclick="closeSidebar()"></div>

  <!-- Sidebar -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-logo">
      <div class="sidebar-logo-ko">비단결고운길 필라테스</div>
      <div class="sidebar-logo-en">Admin Dashboard</div>
    </div>
    <nav class="sidebar-nav">
      <div class="snav-item on" onclick="goTab('dash',this)" data-tab="dash"><span class="snav-icon">🏠</span>대시보드</div>
      <div class="snav-item" onclick="goTab('res',this)" data-tab="res"><span class="snav-icon">📋</span>예약 · 문의</div>
      <div class="snav-item" onclick="goTab('mem',this)" data-tab="mem"><span class="snav-icon">👥</span>회원 관리</div>
      <div class="snav-item" onclick="goTab('pass',this)" data-tab="pass"><span class="snav-icon">💳</span>수강권</div>
      <div class="snav-item" onclick="goTab('notice',this)" data-tab="notice"><span class="snav-icon">📢</span>공지사항</div>
    </nav>
    <div class="sidebar-footer">
      <button class="logout-btn" onclick="doLogout()">로그아웃</button>
    </div>
  </aside>

  <!-- Topbar -->
  <header class="topbar">
    <button class="menu-btn" id="menuBtn" onclick="toggleSidebar()">☰</button>
    <div class="topbar-title serif" id="topbarTitle">대시보드</div>
    <div class="topbar-date" id="dateChip"></div>
    <div class="admin-chip">관리자</div>
  </header>

  <!-- Content -->
  <main class="content">
    <div class="content-inner">

      <!-- ── 대시보드 ── -->
      <div class="tp on" id="tp-dash">
        <div class="stat-grid">
          <div class="stat-card"><div class="stat-icon">📌</div><div class="stat-label">오늘 예약</div><div class="stat-val" id="s-res">—</div><div class="stat-sub">건 확정</div></div>
          <div class="stat-card"><div class="stat-icon">👥</div><div class="stat-label">전체 회원</div><div class="stat-val" id="s-mem">—</div><div class="stat-sub">명</div></div>
          <div class="stat-card"><div class="stat-icon">🆕</div><div class="stat-label">신규 문의</div><div class="stat-val" id="s-inq">—</div><div class="stat-sub">건 미확인</div></div>
          <div class="stat-card"><div class="stat-icon">⚠️</div><div class="stat-label">만료 임박</div><div class="stat-val" id="s-exp">—</div><div class="stat-sub">7일 이내</div></div>
        </div>
        <div class="sec-title">오늘 예약</div>
        <div class="item-list" id="todayList"><div class="loading"><div class="spinner"></div> 불러오는 중...</div></div>
      </div>

      <!-- ── 예약·문의 ── -->
      <div class="tp" id="tp-res">
        <div class="page-title">
          예약 · 문의
          <button class="btn btn-p btn-sm" onclick="openModal('addRes')">+ 예약 추가</button>
        </div>
        <div class="toolbar">
          <input class="fi" id="resSearch" placeholder="🔍 수업명·메모 검색" oninput="filterRes()">
          <select class="fi fi-fixed" id="resStatus" style="width:120px" onchange="filterRes()">
            <option value="">전체</option>
            <option value="inquiry">신규문의</option>
            <option value="confirmed">확정</option>
            <option value="completed">완료</option>
            <option value="cancelled">취소</option>
            <option value="noshow">노쇼</option>
          </select>
        </div>
        <div class="item-list" id="resList"><div class="loading"><div class="spinner"></div></div></div>
      </div>

      <!-- ── 회원 ── -->
      <div class="tp" id="tp-mem">
        <div class="page-title">
          회원 관리
          <button class="btn btn-p btn-sm" onclick="openModal('addMem')">+ 회원 등록</button>
        </div>
        <div class="toolbar">
          <input class="fi" id="memSearch" placeholder="🔍 이름·연락처 검색" oninput="filterMem()">
        </div>
        <div class="item-list" id="memList"><div class="loading"><div class="spinner"></div></div></div>
      </div>

      <!-- ── 수강권 ── -->
      <div class="tp" id="tp-pass">
        <div class="page-title">
          수강권 현황
          <button class="btn btn-p btn-sm" onclick="openModal('addPass')">+ 부여</button>
        </div>
        <div class="toolbar">
          <input class="fi" id="passSearch" placeholder="🔍 회원 이름 검색" oninput="filterPass()">
          <select class="fi fi-fixed" id="passStatus" style="width:100px" onchange="filterPass()">
            <option value="">전체</option>
            <option value="active">활성</option>
            <option value="expired">만료</option>
            <option value="paused">정지</option>
          </select>
        </div>
        <div class="item-list" id="passList"><div class="loading"><div class="spinner"></div></div></div>
      </div>

      <!-- ── 공지 ── -->
      <div class="tp" id="tp-notice">
        <div class="page-title">
          공지사항
          <button class="btn btn-p btn-sm" onclick="openModal('addNotice')">+ 작성</button>
        </div>
        <div id="noticeList"><div class="loading"><div class="spinner"></div></div></div>
      </div>

    </div>
  </main>

  <!-- Bottom Nav (mobile) -->
  <nav class="bottom-nav">
    <button class="bnav-item on" onclick="goTab('dash',this)" data-tab="dash"><span class="bnav-icon">🏠</span><span class="bnav-label">홈</span></button>
    <button class="bnav-item" onclick="goTab('res',this)" data-tab="res"><span class="bnav-icon">📋</span><span class="bnav-label">예약</span></button>
    <button class="bnav-item" onclick="goTab('mem',this)" data-tab="mem"><span class="bnav-icon">👥</span><span class="bnav-label">회원</span></button>
    <button class="bnav-item" onclick="goTab('pass',this)" data-tab="pass"><span class="bnav-icon">💳</span><span class="bnav-label">수강권</span></button>
    <button class="bnav-item" onclick="goTab('notice',this)" data-tab="notice"><span class="bnav-icon">📢</span><span class="bnav-label">공지</span></button>
  </nav>

</div>

<!-- ── MODAL ── -->
<div class="overlay" id="overlay" onclick="overlayClick(event)">
  <div class="modal" id="modal">
    <div class="modal-handle"></div>
    <div class="modal-hd">
      <div class="modal-title" id="mTitle"></div>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div id="mBody"></div>
    <div class="modal-ft">
      <button class="btn btn-o" onclick="closeModal()">취소</button>
      <button class="btn btn-p" id="mSaveBtn" onclick="saveModal()">저장</button>
    </div>
  </div>
</div>

<script>
/* ────────────────────────────────────────
   STATE
──────────────────────────────────────── */
let members=[], passes=[], reservations=[], passTypes=[], notices=[];
let modalMode='', editId=null;
const today = new Date().toISOString().slice(0,10);
const tabNames = { dash:'대시보드', res:'예약 · 문의', mem:'회원 관리', pass:'수강권', notice:'공지사항' };

/* ────────────────────────────────────────
   INIT
──────────────────────────────────────── */
document.getElementById('dateChip').textContent =
  new Date().toLocaleDateString('ko-KR',{month:'long',day:'numeric',weekday:'short'});

async function init() {
  const { data:{ session } } = await db.auth.getSession();
  if (session) showApp();
  db.auth.onAuthStateChange((_,s) => { if(s) showApp(); else showLogin(); });
}

function showApp() {
  document.getElementById('loginWrap').style.display='none';
  document.getElementById('app').classList.add('ready');
  loadAll();
}
function showLogin() {
  document.getElementById('loginWrap').style.display='flex';
  document.getElementById('app').classList.remove('ready');
}

async function loadAll() {
  await Promise.all([loadMembers(),loadPasses(),loadReservations(),loadPassTypes(),loadNotices()]);
  updateDash();
}

/* ────────────────────────────────────────
   AUTH
──────────────────────────────────────── */
async function doLogin() {
  const email=v('lEmail'), pw=v('lPw');
  document.getElementById('loginErr').textContent='';
  const { error } = await db.auth.signInWithPassword({ email, password: pw });
  if (error) document.getElementById('loginErr').textContent='이메일 또는 비밀번호를 확인해주세요.';
}
async function doLogout() {
  await db.auth.signOut(); showLogin();
  toast('로그아웃 되었습니다.');
}

/* ────────────────────────────────────────
   LOAD
──────────────────────────────────────── */
async function loadMembers() {
  const { data } = await db.from('members').select('*').order('created_at',{ascending:false});
  members = data||[]; renderMem(members);
}
async function loadPasses() {
  const { data } = await db.from('member_passes').select('*, members(name,phone)').order('created_at',{ascending:false});
  passes = data||[]; renderPass(passes);
}
async function loadReservations() {
  const { data } = await db.from('reservations').select('*').order('reserved_date',{ascending:false}).order('start_time',{ascending:false});
  reservations = data||[]; renderRes(reservations);
}
async function loadPassTypes() {
  const { data } = await db.from('pass_types').select('*');
  passTypes = data||[];
}
async function loadNotices() {
  const { data } = await db.from('notices').select('*').order('is_pinned',{ascending:false}).order('created_at',{ascending:false});
  notices = data||[]; renderNotices(notices);
}

/* ────────────────────────────────────────
   DASHBOARD
──────────────────────────────────────── */
function updateDash() {
  const todayRes = reservations.filter(r=>r.reserved_date===today && r.status==='confirmed');
  const inq = reservations.filter(r=>r.status==='inquiry');
  const expSoon = passes.filter(p=>{
    if(p.status!=='active') return false;
    const diff = (new Date(p.expire_date)-new Date())/86400000;
    return diff>=0 && diff<=7;
  });
  s('s-res', todayRes.length);
  s('s-mem', members.length);
  s('s-inq', inq.length);
  s('s-exp', expSoon.length);

  const el = document.getElementById('todayList');
  if (!todayRes.length) {
    el.innerHTML = empty('오늘 예약된 수업이 없습니다.');
    return;
  }
  todayRes.sort((a,b)=>a.start_time>b.start_time?1:-1);
  el.innerHTML = todayRes.map(r=>`
    <div class="today-item">
      <div class="today-time">
        <div class="today-time-v">${(r.start_time||'').slice(0,5)}</div>
        <div class="today-time-d">오늘</div>
      </div>
      <div class="today-div"></div>
      <div class="today-info">
        <div class="today-cls">${r.class_title}</div>
        <div class="today-memo">${r.memo||'메모 없음'}</div>
      </div>
      <span class="badge b-green">확정</span>
    </div>`).join('');
}

/* ────────────────────────────────────────
   RENDER: RESERVATIONS
──────────────────────────────────────── */
const statusLbl = { inquiry:'신규문의', confirmed:'확정', completed:'완료', cancelled:'취소', noshow:'노쇼' };
const statusBdg = { inquiry:'b-yellow', confirmed:'b-green', completed:'b-gray', cancelled:'b-red', noshow:'b-red' };

function renderRes(data) {
  const el = document.getElementById('resList');
  if (!data.length) { el.innerHTML=empty('예약 내역이 없습니다.'); return; }
  el.innerHTML = data.map(r=>`
    <div class="item-card ${r.status==='inquiry'?'inquiry':''}">
      <div class="item-row">
        <div class="item-main">
          <div class="item-name">${r.class_title}</div>
          <div class="item-meta">
            ${r.reserved_date||'날짜미정'} ${(r.start_time||'').slice(0,5)}<br>
            ${r.memo ? '💬 '+r.memo : ''}
          </div>
        </div>
        <span class="badge ${statusBdg[r.status]||'b-gray'}">${statusLbl[r.status]||r.status}</span>
      </div>
      <div style="display:flex;gap:6px;margin-top:10px;flex-wrap:wrap">
        ${r.status==='inquiry'?`<button class="btn btn-s btn-sm" onclick="confirmRes('${r.id}')">✅ 확정</button>`:''}
        <button class="btn btn-o btn-sm" onclick="editRes('${r.id}')">수정</button>
        <button class="btn btn-d btn-sm" onclick="deleteRes('${r.id}')">삭제</button>
      </div>
    </div>`).join('');
}
function filterRes() {
  const q=v('resSearch').toLowerCase(), st=document.getElementById('resStatus').value;
  renderRes(reservations.filter(r=>
    (!q || r.class_title?.toLowerCase().includes(q) || r.memo?.toLowerCase().includes(q)) &&
    (!st || r.status===st)
  ));
}
async function confirmRes(id) {
  await db.from('reservations').update({status:'confirmed'}).eq('id',id);
  toast('예약이 확정되었습니다 ✅');
  await loadReservations(); updateDash();
}
async function deleteRes(id) {
  if(!confirm('삭제하시겠습니까?')) return;
  await db.from('reservations').delete().eq('id',id);
  toast('삭제되었습니다.'); await loadReservations(); updateDash();
}
function editRes(id) {
  const r = reservations.find(x=>x.id===id); if(!r) return;
  openModal('addRes',id);
  document.getElementById('mTitle').textContent='예약 수정';
  g('f-date').value=r.reserved_date||'';
  g('f-time').value=(r.start_time||'').slice(0,5);
  g('f-cls').value=r.class_title||'';
  g('f-memo').value=r.memo||'';
  modalMode='editRes';
}

/* ────────────────────────────────────────
   RENDER: MEMBERS
──────────────────────────────────────── */
function renderMem(data) {
  const el = document.getElementById('memList');
  if (!data.length) { el.innerHTML=empty('등록된 회원이 없습니다.'); return; }
  el.innerHTML = data.map(m=>`
    <div class="item-card">
      <div class="item-row">
        <div class="item-main">
          <div class="item-name">👤 ${m.name}</div>
          <div class="item-meta">
            📞 ${m.phone||'—'}<br>
            ${m.email?'✉️ '+m.email+'<br>':''}
            ${m.birth_date?'🎂 '+m.birth_date+'<br>':''}
            ${m.memo?'💬 '+m.memo:''}
          </div>
        </div>
        <div class="item-actions">
          <button class="btn btn-o btn-sm" onclick="editMem('${m.id}')">수정</button>
          <button class="btn btn-d btn-sm" onclick="delMem('${m.id}')">삭제</button>
        </div>
      </div>
    </div>`).join('');
}
function filterMem() {
  const q=v('memSearch').toLowerCase();
  renderMem(q ? members.filter(m=>m.name?.toLowerCase().includes(q)||m.phone?.includes(q)) : members);
}
async function delMem(id) {
  if(!confirm('회원을 삭제하시겠습니까?\n관련 수강권·예약도 함께 삭제됩니다.')) return;
  await db.from('members').delete().eq('id',id);
  toast('삭제되었습니다.'); await loadMembers(); updateDash();
}
function editMem(id) {
  const m = members.find(x=>x.id===id); if(!m) return;
  openModal('addMem',id);
  document.getElementById('mTitle').textContent='회원 수정';
  g('f-name').value=m.name||'';
  g('f-phone').value=m.phone||'';
  g('f-email').value=m.email||'';
  g('f-birth').value=m.birth_date||'';
  g('f-memo').value=m.memo||'';
  modalMode='editMem';
}

/* ────────────────────────────────────────
   RENDER: PASSES
──────────────────────────────────────── */
const passLbl = { active:'활성', expired:'만료', paused:'정지' };
const passBdg = { active:'b-green', expired:'b-red', paused:'b-yellow' };

function renderPass(data) {
  const el = document.getElementById('passList');
  if (!data.length) { el.innerHTML=empty('수강권 내역이 없습니다.'); return; }
  el.innerHTML = data.map(p=>{
    const used=p.used_count||0, total=p.total_count||1, remain=total-used;
    const pct=Math.round((used/total)*100);
    const low = remain<=2;
    return `<div class="item-card">
      <div class="item-row">
        <div class="item-main">
          <div class="item-name">👤 ${p.members?.name||'—'}</div>
          <div class="item-meta">
            ${p.pass_name}<br>
            잔여 <strong style="color:${low?'var(--red)':'var(--dark)'}">${remain}회</strong> / 총 ${total}회
            <div class="progress"><div class="progress-fill" style="width:${pct}%"></div></div>
            만료일: ${p.expire_date||'—'}
          </div>
        </div>
        <span class="badge ${passBdg[p.status]||'b-gray'}">${passLbl[p.status]||p.status}</span>
      </div>
      <div style="display:flex;gap:6px;margin-top:10px;flex-wrap:wrap">
        <button class="btn btn-s btn-sm" onclick="usePass('${p.id}',${used},${total})">− 1회 차감</button>
        <button class="btn btn-d btn-sm" onclick="delPass('${p.id}')">삭제</button>
      </div>
    </div>`;
  }).join('');
}
function filterPass() {
  const q=v('passSearch').toLowerCase(), st=document.getElementById('passStatus').value;
  renderPass(passes.filter(p=>
    (!q || p.members?.name?.toLowerCase().includes(q)) &&
    (!st || p.status===st)
  ));
}
async function usePass(id, used, total) {
  if(used>=total){ toast('잔여 횟수가 없습니다.'); return; }
  if(!confirm('1회 차감하시겠습니까?')) return;
  const newUsed=used+1, newSt=newUsed>=total?'expired':'active';
  await db.from('member_passes').update({used_count:newUsed,status:newSt}).eq('id',id);
  toast('1회 차감 완료 ✅'); loadPasses();
}
async function delPass(id) {
  if(!confirm('수강권을 삭제하시겠습니까?')) return;
  await db.from('member_passes').delete().eq('id',id);
  toast('삭제되었습니다.'); loadPasses();
}

/* ────────────────────────────────────────
   RENDER: NOTICES
──────────────────────────────────────── */
function renderNotices(data) {
  const el = document.getElementById('noticeList');
  if (!data.length) { el.innerHTML=empty('공지사항이 없습니다.'); return; }
  el.innerHTML = data.map(n=>`
    <div class="notice-card">
      <div class="notice-hd">
        <div class="notice-title">${n.is_pinned?'📌 ':''}${n.title}</div>
        <div style="display:flex;align-items:center;gap:8px">
          <span class="notice-date">${(n.created_at||'').slice(0,10)}</span>
          <button class="btn btn-d btn-sm" onclick="delNotice('${n.id}')">삭제</button>
        </div>
      </div>
      <div class="notice-body">${n.content}</div>
    </div>`).join('');
}
async function delNotice(id) {
  if(!confirm('삭제하시겠습니까?')) return;
  await db.from('notices').delete().eq('id',id);
  toast('삭제되었습니다.'); loadNotices();
}

/* ────────────────────────────────────────
   MODAL
──────────────────────────────────────── */
const clsOpts = ['기초 필라테스','체형 교정','다이어트 필라테스','재활 필라테스','상담 문의'].map(c=>`<option>${c}</option>`).join('');

const modalForms = {
  addRes: {
    title: '예약 추가',
    body: () => `
      <div class="frow">
        <div class="fg"><label class="fl">날짜 *</label><input class="finp" id="f-date" type="date" value="${today}"></div>
        <div class="fg"><label class="fl">시간</label><input class="finp" id="f-time" type="time" value="10:00"></div>
      </div>
      <div class="fg"><label class="fl">수업명</label><select class="fsel" id="f-cls">${clsOpts}</select></div>
      <div class="fg"><label class="fl">메모</label><input class="finp" id="f-memo" placeholder="이름, 연락처, 특이사항 등"></div>`
  },
  addMem: {
    title: '회원 등록',
    body: () => `
      <div class="frow">
        <div class="fg"><label class="fl">이름 *</label><input class="finp" id="f-name" placeholder="홍길동"></div>
        <div class="fg"><label class="fl">연락처</label><input class="finp" id="f-phone" placeholder="010-0000-0000" type="tel"></div>
      </div>
      <div class="fg"><label class="fl">이메일</label><input class="finp" id="f-email" type="email" placeholder="(선택)"></div>
      <div class="fg"><label class="fl">생년월일</label><input class="finp" id="f-birth" type="date"></div>
      <div class="fg"><label class="fl">메모</label><textarea class="fta" id="f-memo" placeholder="부상이력, 목표 등"></textarea></div>`
  },
  addPass: {
    title: '수강권 부여',
    body: () => `
      <div class="fg"><label class="fl">회원 *</label>
        <select class="fsel" id="f-mem">${members.map(m=>`<option value="${m.id}">${m.name} (${m.phone})</option>`).join('')}</select>
      </div>
      <div class="fg"><label class="fl">수강권 종류</label>
        <select class="fsel" id="f-ptype" onchange="onPassTypeChange(this)">
          ${passTypes.map(p=>`<option value="${p.id}" data-count="${p.total_count}" data-days="${p.valid_days}" data-name="${p.name}">${p.name} (${p.total_count}회 / ${Math.round(p.price/10000)}만원)</option>`).join('')}
          <option value="custom">직접 입력</option>
        </select>
      </div>
      <div id="customF" style="display:none">
        <div class="frow">
          <div class="fg"><label class="fl">수강권명</label><input class="finp" id="f-pname" placeholder="1:1 레슨 10회"></div>
          <div class="fg"><label class="fl">총 횟수</label><input class="finp" id="f-pcount" type="number" value="10" min="1"></div>
        </div>
      </div>
      <div class="frow">
        <div class="fg"><label class="fl">시작일</label><input class="finp" id="f-start" type="date" value="${today}"></div>
        <div class="fg"><label class="fl">만료일 *</label><input class="finp" id="f-expire" type="date"></div>
      </div>`
  },
  addNotice: {
    title: '공지 작성',
    body: () => `
      <div class="fg"><label class="fl">제목 *</label><input class="finp" id="f-ntitle" placeholder="공지 제목"></div>
      <div class="fg"><label class="fl">내용 *</label><textarea class="fta" id="f-ncontent" placeholder="공지 내용"></textarea></div>
      <div class="fg" style="display:flex;align-items:center;gap:8px">
        <input type="checkbox" id="f-pin" style="width:18px;height:18px;accent-color:var(--rose)">
        <label for="f-pin" class="fl" style="margin:0">상단 고정</label>
      </div>`
  }
};

function openModal(mode, id) {
  modalMode=mode; editId=id||null;
  const form = modalForms[mode];
  document.getElementById('mTitle').textContent = form.title;
  document.getElementById('mBody').innerHTML = form.body();
  document.getElementById('overlay').classList.add('open');
  document.body.style.overflow='hidden';
  if (mode==='addPass') onPassTypeChange(g('f-ptype'));
}
function closeModal() {
  document.getElementById('overlay').classList.remove('open');
  document.body.style.overflow='';
  modalMode=''; editId=null;
}
function overlayClick(e) { if(e.target.id==='overlay') closeModal(); }

function onPassTypeChange(sel) {
  const isCustom = sel.value==='custom';
  document.getElementById('customF').style.display=isCustom?'block':'none';
  if (!isCustom) {
    const opt=sel.options[sel.selectedIndex];
    const d=new Date(); d.setDate(d.getDate()+parseInt(opt.dataset.days||90));
    g('f-expire').value=d.toISOString().slice(0,10);
  }
}

async function saveModal() {
  const btn=document.getElementById('mSaveBtn');
  btn.textContent='저장 중...'; btn.disabled=true;
  try {
    if (modalMode==='addRes'||modalMode==='editRes') {
      const data={ reserved_date:v('f-date'), start_time:v('f-time')||'00:00', class_title:v('f-cls')||v('f-memo'), status:'confirmed', memo:v('f-memo') };
      if (modalMode==='editRes') await db.from('reservations').update(data).eq('id',editId);
      else await db.from('reservations').insert(data);
      toast(modalMode==='editRes'?'수정 완료!':'예약 추가 완료 ✅');
      await loadReservations(); updateDash();

    } else if (modalMode==='addMem'||modalMode==='editMem') {
      if(!v('f-name')){ toast('이름을 입력해주세요.'); return; }
      const data={ name:v('f-name'), phone:v('f-phone')||null, email:v('f-email')||null, birth_date:v('f-birth')||null, memo:v('f-memo')||null };
      if (modalMode==='editMem') await db.from('members').update(data).eq('id',editId);
      else await db.from('members').insert(data);
      toast(modalMode==='editMem'?'수정 완료!':'회원 등록 완료 🎉');
      await loadMembers(); updateDash();

    } else if (modalMode==='addPass') {
      if(!members.length){ toast('먼저 회원을 등록해주세요.'); return; }
      const sel=g('f-ptype');
      const isCustom=sel.value==='custom';
      const opt=sel.options[sel.selectedIndex];
      const passName=isCustom?v('f-pname'):opt.dataset.name;
      const totalCount=isCustom?parseInt(v('f-pcount')):parseInt(opt.dataset.count);
      if(!v('f-expire')){ toast('만료일을 입력해주세요.'); return; }
      await db.from('member_passes').insert({
        member_id:v('f-mem'), pass_type_id:isCustom?null:sel.value,
        pass_name:passName, total_count:totalCount,
        start_date:v('f-start'), expire_date:v('f-expire'), status:'active'
      });
      toast('수강권 부여 완료 💳'); await loadPasses(); updateDash();

    } else if (modalMode==='addNotice') {
      if(!v('f-ntitle')){ toast('제목을 입력해주세요.'); return; }
      await db.from('notices').insert({ title:v('f-ntitle'), content:v('f-ncontent'), is_pinned:g('f-pin')?.checked||false });
      toast('공지 등록 완료 📢'); loadNotices();
    }
    closeModal();
  } catch(err) {
    toast('오류: '+err.message);
  }
  btn.textContent='저장'; btn.disabled=false;
}

/* ────────────────────────────────────────
   NAVIGATION
──────────────────────────────────────── */
function goTab(tab, el) {
  // panels
  document.querySelectorAll('.tp').forEach(t=>t.classList.remove('on'));
  document.getElementById('tp-'+tab).classList.add('on');
  // sidebar
  document.querySelectorAll('.snav-item').forEach(t=>t.classList.remove('on'));
  document.querySelectorAll(`.snav-item[data-tab="${tab}"]`).forEach(t=>t.classList.add('on'));
  // bottom nav
  document.querySelectorAll('.bnav-item').forEach(t=>t.classList.remove('on'));
  document.querySelectorAll(`.bnav-item[data-tab="${tab}"]`).forEach(t=>t.classList.add('on'));
  // title
  document.getElementById('topbarTitle').textContent = tabNames[tab]||'';
  // close sidebar on mobile
  if(window.innerWidth<768) closeSidebar();
  window.scrollTo(0,0);
}

function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('sideOverlay').classList.toggle('show');
}
function closeSidebar() {
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('sideOverlay').classList.remove('show');
}

/* ────────────────────────────────────────
   UTILS
──────────────────────────────────────── */
const v = id => (document.getElementById(id)?.value||'').trim();
const g = id => document.getElementById(id);
const s = (id,val) => { const el=document.getElementById(id); if(el) el.textContent=val; };
const empty = msg => `<div class="empty"><div class="empty-icon">🌿</div><p>${msg}</p></div>`;

function toast(msg) {
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),3000);
}

// Enter key login
document.getElementById('lPw')?.addEventListener('keydown', e=>{ if(e.key==='Enter') doLogin(); });
document.getElementById('lEmail')?.addEventListener('keydown', e=>{ if(e.key==='Enter') document.getElementById('lPw').focus(); });

init();
